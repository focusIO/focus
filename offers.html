<!DOCTYPE html>
<html lang = "en">
    <meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="Focus+clear.png" type="image/x-icon">
    <head>

            body{
                background-color: #f6f6f6;
            }
            .offers{
                font-weight: bolder;  
                border-bottom: 3px solid #002848;
                margin-top: 1px;
            }
            .header, .searchBox{
                display: flex;
                align-items: center;
                justify-content: space-between;
                background-color: #ffffff;
                padding: 10px 20px;
                font-family: Tahoma;
                font-size: 100%;
                color: #002848;
                font-weight: bold;
            }
            .logo{
                width: 5%;
                height: auto;
            }
            .logo:hover{
                cursor: pointer;
            }
            .header a{
                color: #002848;
                text-decoration: none;
                transition: background-color 0.3s;
            }
            .header a:hover{
                font-weight: bold;
                border-bottom: 2px solid #002848;
            }
            #notifButton{
                padding: 10px;
            }
            #search{
                padding: 5px;
                border: none;
                border-radius: 4px;
                border-color: #002848;
            }
            #searchButton, #notifButton, #chat{
                width: 30px; /* Adjust icon size */
                height: auto;
                cursor: pointer;
            }
            #accountButton{
                background-color: #002848;
                color: white;
                border-radius: 55px;
                margin-left: 20px;
                font-size: 1.2em;
                padding: 10px 15px;
            }
            #account{
                cursor: pointer;
            }

            /*Solely for Offers Page*/
            .label{
                font-family: AriaL;
                padding: 10px;
                background-color: #ffffff;
                border-radius: 20px;
                margin: 1% 15%;
                display: flex;
                flex: 1;
                padding: 10px 40px;
            }
            .title{
                color: #002848;
                font-size: 200%;
                text-align: left;
                padding: 15px 40px;
                border: 2px solid transparent;
                border-image: linear-gradient(330deg, #ffffff, #002848) 1;
            }
            .categories{
                background-color: #ffffff;
                border: #002848 transparent  2px;
                border-radius: 20px;
                margin: 1% 15%;
                flex: 1 1 150px; /* Grow, shrink, and set a base width */
                transition: background-color 0.3s ease;
            }
            .orgs{
                padding: 1% 2%;
                flex: 1 1 150px; /* Grow, shrink, and set a base width */
                transition: background-color 0.3s ease;
            }
            .searchBoxOffers{
                display: flex;
                align-items: center;
                justify-content: space-evenly;
                background-color: #ffffff;
            }
            #searchOffers{
                width: 30%;
                border: #002848 solid 1px;
                border-radius: 5px;
                padding: 5px;
            }
            #searchButtonOffers{
                margin-left: -13%;
                width: 30px; /* Adjust icon size */
                height: auto;
                cursor: pointer;
            }
            .buttons{
                display: flex;
                align-items: center;
                flex-direction: column; /* Align buttons vertically */
                gap: 5px; /* Space between buttons */
                box-sizing: border-box;
                padding-bottom: 20px;
            }
            .tesdaContent, .howContent, .tuitionContent, .certContent, .whoContent{
                display: none; /* Hidden by default */
                padding: 5px 30px;
                border: 1px transparent #002848;
                background-color: white;
                border-radius: 5px;
                text-align: justify;
                width: 400px;
            }
            .whoContent{margin-bottom: 1%;}
            .tesdaButton, .depedButton, .pesoButton, .bfarButton, .dswdButton{
                width: 100%;
                cursor: pointer;
                padding: 10px 20px;
                background-color:#002848;
                color: white;
                border: none;
                border-radius: 5px;
                text-align: left;
                margin: 0.2% 2%;
                font-size: 110%;
                flex: 1 1 150px; /* Grow, shrink, and set a base width */
                transition: background-color 0.3s ease;
            }
            .whatButton:hover, .howButton:hover, .tuitionButton:hover, .certButton:hover, .whoButton:hover{
                text-decoration: underline;
                font-weight: bold;
            }
            #agri:hover, #auto:hover, #cons:hover{
                font-weight: bold;
                text-decoration: underline;
                transform: scale(1.02);
            }
        </style>
        <title>TRAINING OFFERS | FOCUS+</title>
    </head>
    <body>
        <div class="header">    
            <img src="Focus+clear.png" class="logo" name="logo" onclick="proceedToHomePage()">
            <a href="home.html" class="home">HOME</a>
            <a href="about.html" class="about">ABOUT</a>
            <a href="offers.html" class="offers">TRAINING OFFERS</a>
            <a href="faqs.html" class="faqs">FAQs</a>
            <!--<a href="feedback.html" class="feedback">FEEDBACK</a>-->
            <a href="contact.html" class="contact">CONTACT</a>
            <div class="searchBox">
            <input type="text" id="search" name="search" placeholder="Search...">
            <img src="https://img.icons8.com/?size=100&id=XU3XKgdpT0qG&format=png&color=000000" id="searchButton" name="searchButton" onclick="proceedToSearch()">
            </div>
            <img src="https://img.icons8.com/?size=100&id=eMfeVHKyTnkc&format=png&color=000000" id="notifButton" name="notifButton" onclick="proceedToNotification()">
            <img src="https://img.icons8.com/?size=100&id=gFDEU6xka9fu&format=png&color=000000" id="chat" name="chat" onclick="proceedToChat()">
            <button id="accountButton" name="accountButton" onclick="proceedToAccount()">M</button>
            <h6 id="account" onclick="proceedToAccount()">v</h6>
        </div>
        <div class="label">
            <h1 class="title">Training Offers</h1>
        </div>
        <div class="categories">
            <div class="orgs">
            <div class="searchBoxOffers">
                <h3 class="labelOffers">Free Training Institutes:</h3>
                <input type="text" id="searchOffers" name="searchOffers" placeholder="Search...">
                <img src="https://img.icons8.com/?size=100&id=XU3XKgdpT0qG&format=png&color=000000" id="searchButtonOffers" name="searchButtonOffers" onclick="proceedToSearch()">
                </div>
            </div>
            <div class="buttons">
            <div class="tesda">
            <button class="tesdaButton">Technical Education and Skills Development Authority (TESDA)</button>
            <div class="tesdaContent">
                    <h4 class="agri" name="agri" id="agri" onclick="">Agriculture</h4>
                    <h4 class="auto" name="auto" id="auto" onclick="">Automotive and Land Transport</h4>
                    <h4 class="cons" name="cons" id="cons" onclick="">Construction</h4>
            </div>
            <div class="deped">
                <button class="depedButton">Department of Education (DepEd)</button>
            </div>
            <div class="peso">
                <button class="depedButton">Public Employment Service Office (PESO)</button>
            </div>
            <div class="bfar">
                <button class="bfarButton">Bureau of Fisheries and Aquatic Resources (BFAR)</button>
            </div>
            <div class="dswd">
                <button class="dswdButton">Department of Social Welfare and Development (DSWD)</button>
            </div>
        </div>
        </div>
        <script>
            function proceedToHomePage(){window.location.href= 'home.html'}
            function proceedToSearch() {window.location.href = 'searchResult.html';}
            function proceedToNotification() {window.location.href = 'notif.html';}
            function proceedToChat() {window.location.href = 'chat.html';}
            function proceedToAccount() {window.location.href = 'account.html';}
            function proceedToEnrollment() {window.location.href = 'enroll.html';}

            document.querySelector('.tesdaButton').addEventListener('click', function(){
                var content = document.querySelector('.tesdaContent');
                if (content.style.display == "none" || content.style.display == ""){
                    content.style.display = "block"; //Show content
                } else{content.style.display = "none";} //Hide content
            });
        </script>
    </body>
