<!DOCTYPE html>

    <head>
        <style>
            body{
	            background-image: url("aa5.jpg");
	            background-repeat: no-repeat;
	            background-attachment: fixed;
	            background-size: cover;
	            background-position: center;
	            z-index: -1;
                overflow-x: hidden;
                overflow-y: auto;
            }
            body::after{
	            content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 200%;
                background-color: rgba(255, 255, 255, 0.6); /* Light overlay with 50% opacity */
                z-index: -1; /* Overlay above the background */
                }
            .contact{
                font-weight: bolder;  
                border-bottom: 3px solid #002848;
                margin-top: 1px;
            }
            .header, .searchBox{
                display: flex;
                align-items: center;
                justify-content: space-between;
                background-color: #ffffff;
                padding: 10px 20px;
                font-family: Tahoma;
                font-size: 100%;
                color: #002848;
                font-weight: bold;
            }
            .logo{
                width: 5%;
                height: auto;
            }
            .logo:hover{
                cursor: pointer;
            }
            .header a{
                color: #002848;
                text-decoration: none;
                transition: background-color 0.3s;
            }
            .header a:hover{
                font-weight: bold;
                border-bottom: 2px solid #002848;
            }
            #notifButton{
                padding: 10px;
            }
            #search{
                padding: 5px;
                border: none;
                border-radius: 4px;
                border-color: #002848;
            }
            #searchButton, #notifButton, #chat{
                width: 30px; /* Adjust icon size */
                height: auto;
                cursor: pointer;
            }
            #accountButton{
                background-color: #002848;
                color: white;
                border-radius: 55px;
                margin-left: 20px;
                font-size: 1.2em;
                padding: 10px 15px;
            }
            #account{
                cursor: pointer;
            }
            .label{
                margin: 1% 6%;
                background-color: rgba(255, 255, 255, 0.8);
                border: 2px transparent;
                border-radius: 30px;
            }
            .headLabel{
                padding: 10px 20px;
                text-align: center;
                color: #002848;
                font-family: arial;
            }
            .contactForm{
                display: flex;
                align-items: center;
                flex-direction: column;
                margin: 0 30%;
                background-color: rgba(0, 40, 72, 0.1);
                border: 2px solid white;
                border-radius: 20px;
            }
            #name, #email, #mob_num, #concerns{
                width: 80%;
                padding: 10px 10px;
                border: 1px solid #002848;
                border-radius: 10px;
            }
            #logo{
                width: 90px;
                height: auto;
                margin-top: 2%;;
            }
            .buttons{
                display: flex;
                justify-content: space-between;
                flex-direction: row;
                padding: 20px 20px;                
            }
            .cancel{
                color: #002848;
                background-color: #ffffff;
                border: 2px solid white;
                border-radius: 10px;
                width: 120px;
                padding: 5px 10px;
                margin-right: 5%;
                
            }
            .cancel:hover{
                font-weight: bold;
                text-decoration: underline;
                transform: scale(1.03);
                box-shadow: 3px 4px 10px rgba(0, 0, 0, 0.5);
                cursor: pointer;
            }
            .submit{
                color: white;
                background-color: #002848;
                border: 2px solid #002848;
                border-radius: 10px;
                width: 120px;
                padding: 5px 10px;
                margin-left: 5%;
            }
            .submit:hover{
                font-weight: bold;
                text-decoration: underline;
                transform: scale(1.03);
                box-shadow: 3px 4px 10px rgba(0, 0, 0, 0.5);
                cursor: pointer;
            }
            .contactLoc{
                display: flex;
                align-items: flex-start;
                flex-direction: row;
                gap: 15px;
                padding: 10px 20px;
            }
            #logoTeam{
                width: 150px;
                height: auto;
            }
            .contactDet{
                display: flex;
                align-items: center;
                justify-content: space-evenly;
                flex-direction: row;
            }
            #fb, #ig, #call, #mail{
                width: 30px;
                height: auto;
                margin-top: 3%;
            }
            #fb:hover, #ig:hover, #call:hover, #mail:hover{
                transform: scale(1.03);
                box-shadow: 3px 4px 10px rgba(0, 0, 0, 0.5);
                cursor: pointer;
            }
